services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  directus:
    image: directus/directus:latest
    depends_on:
      - postgres
    ports:
      - "8055:8055"
    env_file:
      - .env

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  pg_data:
  minio_data:
